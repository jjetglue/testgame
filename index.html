<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. Remove browser default margins/padding */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
        }

        /* 2. Style the iframe to fill the screen */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;    /* Removes the default gray border */
            display: block;  /* Removes the small gap at the bottom */
        }
    </style>
</head>
<body>
<iframe 
    src="https://coolmathgames.com" 
    width="100%" 
    height="100%" 
    title="pro"
    sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-top-navigation"
    style="border:none;">
</iframe>
</body>
</html>
