<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Site</title>
    
    <!-- 1. Required Scripts for the Bypass to work -->
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>

    <style>
        /* Remove browser default margins/padding */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
        }

        /* Style the iframe to fill the screen */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

<!-- 2. Added 'is="x-frame-bypass"' to trigger the proxy -->
<iframe 
    src="https://crazygames.com" 
    style="width: 100%; height: 100%;" 
    frameborder="0" 
    allow="gamepad *;" 
    allowfullscreen="true">
</iframe>


</body>
</html>
